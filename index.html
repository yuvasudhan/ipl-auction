.inp:focus{border-color:#3b82f6}
.btn-g{padding:13px 28px;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.btn-g:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.btn-o{padding:13px 28px;background:transparent;border:2px solid #3b82f6;border-radius:10px;color:#3b82f6;font-size:15px;font-weight:800;cursor:pointer;font-family:'Rajdhani',sans-serif}
.btn-s{padding:7px 14px;background:#334155;border:none;border-radius:6px;color:#f1f5f9;cursor:pointer;font-size:12px;font-family:'Rajdhani',sans-serif}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.sm{background:#1e293b;border-radius:8px;padding:8px;text-align:center}
.sm .v{font-size:16px;font-weight:800;color:#f8fafc}
.sm .k{font-size:9px;color:#64748b;letter-spacing:1px;margin-top:1px}
.slbl{font-size:10px;color:#475569;letter-spacing:2px;margin-bottom:10px;font-weight:700}
.tab{padding:10px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:#64748b;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif}
.tab.on{background:#1e293b;border-bottom-color:#f59e0b;color:#f8fafc}
#notif{display:none;position:fixed;top:16px;right:16px;z-index:9999;padding:12px 20px;border-radius:8px;font-weight:700;font-size:14px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
@keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.4s infinite}
</style>

function boot(){

// ══════════════════════════════════════════
//  PURE REST API HELPERS (no SDK needed)
//  Works with sb_publishable_ keys
// ══════════════════════════════════════════
function apiHeaders(){
  return {
    "Content-Type":"application/json",
    "apikey": CFG.key,
    "Authorization": "Bearer "+CFG.key,
    "Prefer": "return=minimal"
  };
}
function apiUrl(path){ return CFG.url+"/rest/v1/"+path; }

async function dbGet(id){
  try{
    const r=await fetch(apiUrl(`ipl_rooms?id=eq.${id}&select=state&limit=1`),{headers:apiHeaders()});
    if(!r.ok) return null;
    const rows=await r.json();
    if(!rows||!rows.length) return null;
    const s=rows[0].state;
    return typeof s==="string"?JSON.parse(s):s;
  }catch(e){console.error("dbGet error",e);return null;}
}

async function dbSet(id,state){
  try{
    // Upsert via REST
    const r=await fetch(apiUrl("ipl_rooms"),{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey": CFG.key,
        "Authorization": "Bearer "+CFG.key,
        "Prefer":"resolution=merge-duplicates,return=minimal"
      },
      body:JSON.stringify({id,state:state,updated_at:new Date().toISOString()})
    });
    if(!r.ok){
      // fallback to patch
      return await dbPatch(id,state);
    }
    return true;
  }catch(e){console.error("dbSet error",e);return false;}
}

async function dbPatch(id,state){
  try{
    const r=await fetch(apiUrl(`ipl_rooms?id=eq.${id}`),{
      method:"PATCH",
      headers:apiHeaders(),
      body:JSON.stringify({state:state,updated_at:new Date().toISOString()})
    });
    return r.ok||r.status===204||r.status===200;
  }catch(e){console.error("dbPatch error",e);return false;}
}
// ── POLLING SYNC (pure REST, works with all key types) ──
let pollInterval=null;
let lastUpdated="";

function subscribe(roomId){
  startPolling(roomId);
}

function startPolling(roomId){
  if(pollInterval) clearInterval(pollInterval);
  pollInterval=setInterval(async()=>{
    try{
      const s=await dbGet(roomId);
      if(!s) return;
      const key=JSON.stringify({l:s.currentLot,p:s.phase,ba:s.bid?.amount,bt:s.bid?.team,tl:Object.keys(s.teams||{}).length});
      if(key===lastUpdated) return;
      lastUpdated=key;
      handleStateUpdate(s);
    }catch(e){}
  },1000); // poll every 1 second for fast sync
}

function stopPolling(){
  if(pollInterval) clearInterval(pollInterval);
  pollInterval=null;
}

function handleStateUpdate(s){
  RS=s;
  const sc=$("app")?.dataset?.screen;
  if(sc==="lobby") renderLobbyBody();
  else if(sc==="auction") renderAuctionAll();
  else if(s.phase==="completed"&&sc!=="results") showResults();
  else if(s.phase==="auction"&&sc==="lobby") showAuction();
}

async function doCreate(){
  const name=$("iname")?.value?.trim();
  if(!name) return notif("Enter your name!","error");
  if(!myTeamId) return notif("Select a franchise!","error");
  myName=name; isHost=true; myRoomId=rnd();
  const players=shuffle(ALL_PLAYERS);
  const state={
    id:myRoomId,host:myName,hostTeam:myTeamId,phase:"waiting",
    currentLot:0,
    bid:{amount:players[0].base,team:null,playerName:null},
    timerEnd:null,
    teams:{[myTeamId]:{name:myName,teamId:myTeamId,budget:BUDGET,squad:[]}},
    players:players.map(p=>({...p})),
    log:[],created:Date.now()
  };
  notif("Creating room…","info");
  const ok=await dbSet(myRoomId,state);
  if(!ok){notif("Supabase error — see setup guide","error");setTimeout(showSetup,1500);return;}
  RS=state; subscribe(myRoomId); showLobby();
}

// ══════════════════════════════════════════
//  DO JOIN
// ══════════════════════════════════════════
async function doJoin(){
  const code=($("icode")?.value||"").trim().toUpperCase();
  const name=($("iname")?.value||"").trim();
  if(!code||!name) return notif("Fill all fields!","error");
  if(!myTeamId) return notif("Select a franchise!","error");
  notif("Joining…","info");
  const state=await dbGet(code);
  if(!state) return notif("Room not found! Check the code.","error");
  if(state.phase!=="waiting") return notif("Auction already started!","error");
  if(state.teams&&state.teams[myTeamId]) return notif("That team is already taken!","error");
  myName=name; myRoomId=code; isHost=false;
  state.teams[myTeamId]={name,teamId:myTeamId,budget:BUDGET,squad:[]};
  await dbPatch(code,state);
  RS=state; subscribe(code); showLobby();
  notif("Joined! 🎉","success");
}

function startTick(){
  clearInterval(tick);
  tick=setInterval(()=>{
    if(!RS||RS.phase!=="auction") return;
    const rem=Math.max(0,Math.ceil(((RS.timerEnd||0)-Date.now())/1000));
    const bar=$("tbar"),txt=$("ttxt");
    if(bar){bar.style.width=`${(rem/30)*100}%`;bar.style.background=rem>10?"#10b981":rem>5?"#f59e0b":"#ef4444";}
    if(txt){txt.textContent=`⏱ ${rem}s`;txt.style.color=rem>10?"#10b981":"#ef4444";}
    if(rem===0&&isHost){clearInterval(tick);doSold();}
  },500);
}

async function placeBid(inc){
  if(!RS||!myTeamId) return;
  const bid=RS.bid||{amount:0,team:null};
  const myTeam=RS.teams?.[myTeamId]||{};
  if(bid.team===myTeamId) return notif("You're already the highest bidder!","error");
  const na=bid.amount+inc;
  if(na>(myTeam.budget||0)) return notif("Not enough budget!","error");
  const s={...RS,bid:{amount:na,team:myTeamId,playerName:myName},timerEnd:Date.now()+30000};
  await dbPatch(myRoomId,s); RS=s;
  notif(`Bid: ₹${na}L 🎯`,"success");
  renderAuctionAll();
}

// ══════════════════════════════════════════
//  SOLD
// ══════════════════════════════════════════
async function doSold(){
  if(!RS||!isHost) return;
  clearInterval(tick);
  const lot=RS.currentLot||0;
  const player=(RS.players||[])[lot];
  if(!player) return;
  const bid=RS.bid||{amount:0,team:null};
  const s=JSON.parse(JSON.stringify(RS)); // deep clone
  const log=[...(s.log||[])];

  if(bid.team&&s.teams?.[bid.team]){
    const t=s.teams[bid.team];
    t.budget-=bid.amount;
    t.squad=[...(t.squad||[]),{...player,soldPrice:bid.amount}];
    log.push({player:player.n,team:bid.team,price:bid.amount,status:"sold"});
    soldOverlay(player,s.teams[bid.team],bid.amount);
  }else{
    log.push({player:player.n,team:null,price:0,status:"unsold"});
    notif(`${player.n} went unsold`,"warning");
  }

  const next=lot+1;
  s.log=log; s.currentLot=next;

  if(next>=(RS.players||[]).length){
    s.phase="completed";
    await dbPatch(myRoomId,s); RS=s;
    setTimeout(showResults,3300);
  }else{
    s.bid={amount:(RS.players||[])[next]?.base||20,team:null,playerName:null};
    s.timerEnd=Date.now()+33300;
    await dbPatch(myRoomId,s); RS=s;
    setTimeout(()=>{startTick();renderAuctionAll();},3300);
  }
}

async function skipP(){
  if(!RS||!isHost) return;
  clearInterval(tick);
  const lot=RS.currentLot||0;
  const player=(RS.players||[])[lot];
  if(!player) return;
  const s=JSON.parse(JSON.stringify(RS));
  s.log=[...(s.log||[]),{player:player.n,team:null,price:0,status:"unsold"}];
  const next=lot+1;
  s.currentLot=next;
  if(next>=(RS.players||[]).length){s.phase="completed";await dbPatch(myRoomId,s);RS=s;showResults();}
  else{
    s.bid={amount:(RS.players||[])[next]?.base||20,team:null,playerName:null};
    s.timerEnd=Date.now()+31000;
    await dbPatch(myRoomId,s); RS=s; startTick(); renderAuctionAll();
  }
}

function cpSQL(){
  const t=$("sqlblock")?.textContent||"";
  navigator.clipboard?.writeText(t).then(()=>notif("SQL copied!","success")).catch(()=>notif("Select and copy manually","info"));
}
